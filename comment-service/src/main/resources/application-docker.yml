server:
  port: 8083

spring:
  application:
    name: comment-service
  profiles:
    active: docker
  datasource:
    url: jdbc:mysql://mysql-comment:3306/commentdb?createDatabaseIfNotExist=true
    username: user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
