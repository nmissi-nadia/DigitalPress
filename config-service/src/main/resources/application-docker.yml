server:
  port: 8888

spring:
  application:
    name: config-service
  profiles:
    active: docker
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config
  datasource:
    url: jdbc:mysql://mysql-user:3306/userdb?createDatabaseIfNotExist=true
    username: user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
