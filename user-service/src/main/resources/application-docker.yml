server:
  port: 8081

spring:
  application:
    name: user-service
  profiles:
    active: docker
  datasource:
    url: jdbc:mysql://mysql-user:3306/userdb?createDatabaseIfNotExist=true
    username: user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: mySecretKey
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
